name: Briefing
description:
  Briefing (brie.fi/ng) is an open-source, privacy-focused video group chat
  application built entirely on WebRTC. It works directly in any modern browser
  with no installation or account required. The single Docker image bundles a
  Vue 3 frontend, a Zerva-based WebSocket signaling server, and a built-in STUN
  server. Features include multi-person video calls, screen sharing, text chat,
  and shareable room links. By default it uses a public STUN/TURN relay; you can
  optionally point it at your own coturn instance via environment variables.
instructions:
  After deployment open the app URL in your browser. A unique room link is
  generated automatically — share it with participants to start a call. HTTPS is
  required for camera and microphone access in production (Easypanel handles
  this automatically). No account or registration is needed.
changeLog:
  - date: 2026-06-30
    description: first release
