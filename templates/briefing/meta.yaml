benefits:
  - title: No Account Required
    description:
      Users join calls directly from a browser link — no sign-up, no login, no
      app install. Ideal for quick ad-hoc meetings and privacy-conscious teams.
  - title: Fully Self-Hosted
    description:
      Host the signaling server and STUN endpoint on your own infrastructure so
      call metadata never touches third-party servers.
  - title: WebRTC Peer-to-Peer
    description:
      Audio and video travel directly between participants after signaling —
      your server is not in the media path, keeping latency low and bandwidth
      usage minimal.
features:
  - title: Group Video Calls
    description:
      Multi-participant video conferencing with a clean grid layout and
      individual controls for camera, microphone, and hang-up.
  - title: Screen Sharing
    description:
      Share your entire screen or a specific window with other participants
      without leaving the browser.
  - title: Text Chat
    description:
      In-call text chat lets participants share links or messages alongside the
      video stream.
  - title: Shareable Room Links
    description:
      Every room gets a unique URL. Send the link to invite anyone — no
      registration or app download on their end.
  - title: Built-in STUN Server
    description:
      Ships with its own STUN server so basic NAT traversal works
      out-of-the-box. Optionally configure a self-hosted coturn instance for
      corporate firewalls.
tags:
  - Video
  - Communication
  - WebRTC
  - Self-Hosted
